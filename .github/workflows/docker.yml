name: Docker

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/aghexporter

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        # needed to emulate arm64 on the amd64 runner
        # pinned to v3.6.0 — https://github.com/docker/setup-qemu-action/releases/tag/v3.6.0
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff9c098b3eda1728a8c

      - name: Set up Docker Buildx
        # pinned to v3.10.0 — https://github.com/docker/setup-buildx-action/releases/tag/v3.10.0
        uses: docker/setup-buildx-action@b5730b5f88f6a3f95d4b3b74a6afd9d0b8d00c6b

      - name: Log in to GHCR
        # pinned to v3.4.0 — https://github.com/docker/login-action/releases/tag/v3.4.0
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        # pinned to v5.7.0 — https://github.com/docker/metadata-action/releases/tag/v5.7.0
        uses: docker/metadata-action@902fa8ec7d6ecbea8a342d6d5feec68694f6b804
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        # pinned to v6.15.0 — https://github.com/docker/build-push-action/releases/tag/v6.15.0
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
