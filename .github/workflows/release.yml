name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave empty to auto-compute via scripts/next-version.sh)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(bash scripts/next-version.sh)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/adguardhome-exporter-linux-amd64       ./cmd/adguardhome-exporter
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/adguardhome-exporter-linux-arm64       ./cmd/adguardhome-exporter
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/adguardhome-exporter-darwin-arm64      ./cmd/adguardhome-exporter
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/adguardhome-exporter-windows-amd64.exe ./cmd/adguardhome-exporter

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.VERSION }}"
          git push origin "${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: dist/*
