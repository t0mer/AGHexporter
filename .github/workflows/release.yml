name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/adguardhome-exporter-linux-amd64       ./cmd/adguardhome-exporter
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/adguardhome-exporter-linux-arm64       ./cmd/adguardhome-exporter
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/adguardhome-exporter-darwin-arm64      ./cmd/adguardhome-exporter
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/adguardhome-exporter-windows-amd64.exe ./cmd/adguardhome-exporter

      - name: Create GitHub Release
        # pinned to v2.3.2 — https://github.com/softprops/action-gh-release/releases/tag/v2.3.2
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          generate_release_notes: true
          files: |
            dist/adguardhome-exporter-linux-amd64
            dist/adguardhome-exporter-linux-arm64
            dist/adguardhome-exporter-darwin-arm64
            dist/adguardhome-exporter-windows-amd64.exe
